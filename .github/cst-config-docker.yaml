schemaVersion: 2.0.0
commandTests:
  - name: "poetry python"
    command: "poetry"
    args: ["run", "which", "python3"]
    expectedOutput: ["/usr/local/bin/python3"]
  - name: "python3 version"
    command: "python3"
    args: ["--version"]
    expectedOutput: ["Python 3.14.*"]
  - name: "poetry"
    command: "which"
    args: ["poetry"]
    expectedOutput: ["/usr/bin/poetry"]
  - name: "poetry version"
    command: "poetry"
    args: ["--version"]
    expectedOutput: ["Poetry (version 1.6*)*"]
  - name: "poetry python version"
    command: "poetry"
    args: ["run", "python3", "--version"]
    expectedOutput: ["Python 3.14.*"]
  - name: "powershell which"
    command: "which"
    args: ["pwsh"]
    expectedOutput: ["/usr/bin/pwsh"]
  - name: "powershell version"
    command: "pwsh"
    args: ["--version"]
    expectedOutput: ["PowerShell 7.*"]
  - name: "ps-empire help"
    command: "./ps-empire"
    args: ["-f", "server", "--help"]
    expectedOutput: ["usage: empire.py server [-h]*"]
  - name: "ps-empire version"
    command: "./ps-empire"
    args: ["-f", "server", "--version"]
    expectedOutput: ["6.* BC Security Fork"]
  - name: "go which"
    command: "which"
    args: ["go"]
    expectedOutput: ["/usr/bin/go"]
  - name: "go version"
    command: "go"
    args: ["version"]
    expectedOutput: ["go version go1.23.* linux/*"]
  - name: "mingw64 gcc exists"
    command: "which"
    args: ["x86_64-w64-mingw32-gcc"]
    expectedOutput: ["/usr/bin/x86_64-w64-mingw32-gcc"]
  - name: "perl exists"
    command: "which"
    args: ["perl"]
    expectedOutput: ["/usr/bin/perl"]
fileExistenceTests:
  - name: 'profiles'
    path: '/empire/empire/server/data/profiles/'
    shouldExist: true
  - name: 'starkiller'
    path: '/root/.local/share/empire/starkiller/'
    shouldExist: true
  - name: 'empire-compiler'
    path: '/root/.local/share/empire/empire-compiler/'
    shouldExist: true
  - name: 'plugin-registries'
    path: '/root/.local/share/empire/plugin-registries/BC-SECURITY/main/registry.yaml'
    shouldExist: true
  - name: 'openssl mingw prefix'
    path: '/opt/openssl-mingw64/'
    shouldExist: true
  - name: 'openssl mingw headers'
    path: '/opt/openssl-mingw64/include/openssl/ssl.h'
    shouldExist: true
